<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pinak 3.0 - Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #F5F4F0; --surface: #FFFFFF; --accent: #2C5F2E; --border: #E2DED8;
}
body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  width: 100%; max-width: 380px; background: var(--surface); border-radius: 16px;
  border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.09);
  padding: 40px 30px;
}
.header { text-align: center; margin-bottom: 32px; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 34px; }
.header-subtitle { font-size: 13.5px; color: #7A7570; }

.auth-tabs {
  display: flex; background: #EFEDE8; border-radius: 12px; padding: 4px; margin-bottom: 28px;
}
.auth-tab {
  flex: 1; padding: 13px; text-align: center; border-radius: 10px; font-weight: 500; cursor: pointer;
}
.auth-tab.active { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.06); color: var(--accent); }

input {
  width: 100%; padding: 15px 16px; border: 1.5px solid var(--border); border-radius: 12px;
  font-size: 15.5px; margin-bottom: 18px;
}
input:focus { border-color: var(--accent); outline: none; }

.auth-btn {
  width: 100%; padding: 15px; background: var(--accent); color: white; border: none;
  border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
}

.message {
  margin-top: 18px; padding: 13px 16px; border-radius: 12px; font-size: 14px; text-align: center; display: none;
}

/* Fast & Beautiful Loader */
.loader {
  position: fixed; inset: 0; background: rgba(245,244,240,0.97);
  display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 10000; gap: 16px;
}
.loader.show { display: flex; }
.loader-circle {
  width: 52px; height: 52px; border: 4px solid #e2ded8; border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 13px; font-weight: 500; color: #555; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-title">Pinak <em>3.0</em></div>
    <div class="header-subtitle">Sign in to continue</div>
  </div>

  <div class="auth-tabs">
    <div class="auth-tab active" id="tabLogin">Login</div>
    <div class="auth-tab" id="tabSignup">Sign Up</div>
  </div>

  <div id="loginForm">
    <input type="email" id="loginEmail" placeholder="ইমেইল" required>
    <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" required>
    <button class="auth-btn" id="loginBtn">Login</button>
  </div>

  <div id="signupForm" style="display: none;">
    <input type="email" id="signupEmail" placeholder="ইমেইল" required>
    <input type="password" id="signupPass" placeholder="পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর)" required>
    <button class="auth-btn" id="signupBtn">Create Account</button>
  </div>

  <div class="message" id="authMessage"></div>
</div>

<div class="loader" id="loader">
  <div class="loader-circle"></div>
  <div class="loader-text">Redirecting...</div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBPpsH3QejWL9sAlemjVhKS-FdR270-ZiA",
  authDomain: "pinak-3.firebaseapp.com",
  projectId: "pinak-3",
  storageBucket: "pinak-3.firebasestorage.app",
  messagingSenderId: "5145950002",
  appId: "1:5145950002:web:0b64786b80c263b0df092b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const MAIN_APP_URL = "https://pinakchakraborty626.github.io/Pinak-3.0/";

// Tab Switch
document.getElementById('tabLogin').onclick = () => {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('signupForm').style.display = 'none';
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tabLogin').classList.add('active');
};

document.getElementById('tabSignup').onclick = () => {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'block';
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tabSignup').classList.add('active');
};

function showMessage(text, isError = false) {
  const msg = document.getElementById('authMessage');
  msg.textContent = text;
  msg.style.display = 'block';
  msg.style.background = isError ? '#fee' : '#E8F0E8';
  msg.style.color = isError ? '#c33' : '#2C5F2E';
}

function redirectToApp() {
  document.getElementById('loader').classList.add('show');
  setTimeout(() => {
    window.location.href = MAIN_APP_URL;
  }, 800);   // খুবই দ্রুত redirect
}

// Sign Up
document.getElementById('signupBtn').onclick = () => {
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPass').value;

  if (pass.length < 6) return showMessage('পাসওয়ার্ড কমপক্ষে ৬ অক্ষর হতে হবে', true);

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => {
      showMessage('অ্যাকাউন্ট তৈরি হয়েছে! Redirecting...');
      redirectToApp();
    })
    .catch(err => showMessage(err.message, true));
};

// Login
document.getElementById('loginBtn').onclick = () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      showMessage('লগইন সফল! Redirecting...');
      redirectToApp();
    })
    .catch(err => showMessage(err.message, true));
};
</script>
</body>
</html>
